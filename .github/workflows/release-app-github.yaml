name: Build and publish app

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '输入要发布的版本号 (如 v0.7.1)，留空则只传Artifacts'
        required: false
        type: string
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  release-app-github:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: gradle/wrapper-validation-action@v2

      - name: Write KeyStore 🗝️
        uses: ./.github/actions/prepare-keystore
        with:
          signingStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          signingKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          signingKeyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStoreBase64: ${{ secrets.KEYSTORE }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Build APKs 📱
        run: ./gradlew assembleRelease

      - name: Upload APKs to Release 🚀
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: app/build/outputs/apk/release/*.apk

      - name: Upload APKs to Artifacts 📦
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

      - name: Build AABs 📱
        run: ./gradlew clean bundleRelease -PdisableSplits

      - name: Upload AABs to Release 🚀
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: app/build/outputs/bundle/release/*.aab

      - name: Upload AABs to Artifacts 📦
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: release-aabs
          path: app/build/outputs/bundle/release/*.aab
